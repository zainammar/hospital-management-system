services:
  - type: web
    name: medicare-hms
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput && python setup_demo.py"
    startCommand: "gunicorn hospital_management.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.10.12"
      - key: DATABASE_URL
        fromDatabase:
          name: medicare-db
          property: connectionString

databases:
  - name: medicare-db
    databaseName: medicare_db
    user: medicare_user
    plan: free
